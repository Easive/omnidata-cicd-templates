name: Build and Publish

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (used for the Docker image name)'
        type: string
        required: true
      go-version:
        description: 'Go version to use'
        type: string
        default: '1.24'
      image-name:
        description: 'Full image name (defaults to ghcr.io/easive/{service-name})'
        type: string
        default: ''
    outputs:
      image-tag:
        description: 'The primary image tag that was pushed (sha-{sha})'
        value: ${{ jobs.build-and-publish.outputs.image-tag }}
      image-digest:
        description: 'The image digest'
        value: ${{ jobs.build-and-publish.outputs.image-digest }}


  # Dummy push trigger — path never exists; prevents GitHub phantom failure runs
  # when this reusable workflow file is committed to .github/workflows/
  push:
    paths:
      - '.github/workflows/.no-direct-trigger'
jobs:
  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/easive/${{ inputs.service-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ inputs.go-version }}
