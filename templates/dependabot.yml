version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    reviewers:
      - easive/backend
    labels:
      - dependencies
      - go
    commit-message:
      prefix: 'chore(deps)'
    groups:
      golang-direct:
        patterns:
          - '*'
        dependency-type: direct
      golang-indirect:
        patterns:
          - '*'
        dependency-type: indirect

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    reviewers:
      - easive/backend
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
